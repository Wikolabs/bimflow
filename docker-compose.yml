version: "3.9"

# BimFlow demo — production-ready POC.
# 2 services orchestrated:
#   - bimflow (Next.js frontend on host port 3022)
#   - bimflow-backend (FastAPI Python, internal only on 8000)
# Internal network so the frontend can reach the backend by service name.

services:
  bimflow-backend:
    image: ghcr.io/wikolabs/bimflow-backend:latest
    container_name: bimflow-backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - bimflow-net

  bimflow:
    image: ghcr.io/wikolabs/bimflow:latest
    container_name: bimflow
    restart: unless-stopped
    ports:
      - "3022:3000"
    environment:
      BACKEND_URL: "http://bimflow-backend:8000"
    depends_on:
      - bimflow-backend
    networks:
      - bimflow-net

networks:
  bimflow-net:
    name: bimflow-net
    driver: bridge
