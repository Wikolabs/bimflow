version: "3.9"

# bimflow demo - production-ready POC.
# 2 services orchestrated:
#   - bimflow (Next.js frontend on host port 3022)
#   - bimflow-backend (FastAPI Python, internal only on 8000)
# Shared external network wkdemo-net (created once by deploy.yml) avoids
# Docker default address-pool exhaustion across all 47 LP stacks.

services:
  bimflow-backend:
    image: ghcr.io/wikolabs/bimflow-backend:latest
    container_name: bimflow-backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - wkdemo_net

  bimflow:
    image: ghcr.io/wikolabs/bimflow:latest
    container_name: bimflow
    restart: unless-stopped
    ports:
      - "3022:3000"
    environment:
      BACKEND_URL: "http://bimflow-backend:8000"
    depends_on:
      - bimflow-backend
    networks:
      - wkdemo_net

networks:
  wkdemo_net:
    name: wkdemo-net
    external: true
